<!doctype html>
<html>
	<head>
		<title>Clase antes de vacaciones</title>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
		/>
		<link rel="stylesheet" href="fetch.css" />
	</head>
	<body>
		<div class="contenedor" id="texto">
			<div class="elemento">Sección 1</div>
			<div class="elemento">Sección 2</div>
			<div class="elemento">Sección 3</div>
			<button id="boton">Imagine Dragons</button>
			<button id="boton-a">Maluma</button>
		</div>

		<div class="artist">
			<div id="img-container">
				<img id="imagen" style="width: 80%" />
			</div>
			<div class="decription">
				<h2 id="name"></h2>
				<p id="biography"></p>
			</div>
		</div>

		<script>
			async function getArtista() {
				const respuesta = await fetch(
					"https://www.theaudiodb.com/api/v1/json/123/artist.php?i=114415",
				);
				const datos = await respuesta.json();
				const artista = datos.artists[0];

				document.getElementById("imagen").src = artista.strArtistThumb;
				document.getElementById("name").textContent = artista.strArtist;
				document.getElementById("biography").textContent =
					artista.strBiographyES || artista.strBiographyEN;
			}

			async function getMaluma() {
				const respuesta = await fetch(
					"https://www.theaudiodb.com/api/v1/json/123/search.php?s=maluma",
				);
				const datos = await respuesta.json();
				const artista = datos.artists[0];

				document.getElementById("imagen").src = artista.strArtistThumb;
				document.getElementById("name").textContent = artista.strArtist;
				document.getElementById("biography").textContent =
					artista.strBiographyES || artista.strBiographyEN;
			}

			document.getElementById("boton").addEventListener("click", getArtista);
			document.getElementById("boton-a").addEventListener("click", getMaluma);
			getArtista();
		</script>
	</body>
</html>
